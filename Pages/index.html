<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Suplements</title>
    <!-- <link rel="favicon" href="../Images/Halter.png"> -->
    <link rel="stylesheet" href="../Styles/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="Logo">
            <img src="../Images/Halter.png" alt="Logo">
            <h1>GYM Suplements</h1>
        </div>
        <div class="informacao">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Contato</a></li>
                <li><img src="../Images/perfil.png" alt="perfil"></li>
            </ul>
        </div>
    </header>
    <section>
        <aside>
            <div class="filtros">
                <h1>Filtros</h1>
                <div class="Marcas">
                    <ul>
                        <li>
                            <h1 class="titulo-marcas">Marcas</h1>
                            <h1 class="nome-marcas"><input type="checkbox" id="">GROWTH</h1>
                            <h1 class="nome-marcas"><input type="checkbox" id="">MAX TITANIUM</h1>
                            <h1 class="nome-marcas"><input type="checkbox" id="">INTEGRALMEDICA</h1>
                            <h1 class="nome-marcas"><input type="checkbox" id="">DUX</h1>
                            <h1 class="nome-marcas"><input type="checkbox" id="">SOLDIERS</h1>
                        </li>
                    </ul>
                    <div class="values"><h1>10 R$</h1><h1>500 R$</h1></div>
                    <input type="range" class="volume-slider" min="1" max="500" value="1">
                </div>
            </div>
        </aside>
        <main>
            <div class="estoque">
                <a href="#">
                    <div class="produto">  
                        <img width="180px" src="../Images/creatinaGrowth.png" alt="">   
                    </div>            
                    <div class="nome-produto">                                     
                        <h2>Creatina Growth</h2>
                    </div>
                </a>

                <a href="#">
                    <div class="produto">  
                        <img width="180px" src="../Images/creatinaSoldiers.png" alt="">   
                    </div>            
                    <div class="nome-produto">                                     
                        <h2>Creatina Soldiers</h2>
                    </div>
                </a>

                <a href="#">
                    <div class="produto">  
                        <img width="180px" src="../Images/wheyGrowth.png" alt="">   
                    </div>            
                    <div class="nome-produto">                                     
                        <h2>Whey Growth</h2>
                    </div>
                </a>

                <a href="#">
                    <div class="produto">  
                        <img width="180px" src="../Images/wheyMAX.png" alt="">   
                    </div>            
                    <div class="nome-produto">                                     
                        <h2>Whey MAX</h2>
                    </div>
                </a>
            </div>
        </main>
    </section>
</body>
</html>
